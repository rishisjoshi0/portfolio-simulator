services:
  - type: web
    name: portfolio-simulator
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm ci && npm run build && cd ..
      pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      # Recommended: create a free Postgres DB at neon.tech or supabase.com and
      # paste its connection string here so portfolios survive redeploys.
      # - key: DATABASE_URL
      #   sync: false
      - key: RISK_FREE_RATE
        value: "0.045"
